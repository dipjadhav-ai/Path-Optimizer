<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Optimizer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🚗 Path Optimizer</h1>

        <p class="info-text">
            Select the source and destination cities shown in the road network map below
            to find the minimum travel cost and optimal route.
        </p>

        <div class="map-container">
            <img src="map.png" alt="Road Network Map">
        </div>

        <div class="input-group">

            <label for="source">Source City</label>

            <select id="source">
                <option value="">Select Source City</option>
            </select>

        </div>

        <div class="input-group">

            <label for="destination">Destination City</label>

            <select id="destination">
                <option value="">Select Destination City</option>
            </select>

        </div>

        <button onclick="findRoute()">
            Find Best Route
        </button>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
